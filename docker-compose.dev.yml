# Development: run only postgres
# Then run Go and Vite locally:
#   cd backend && go run .
#   cd frontend && npm run dev
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: lmsdev
    volumes:
      - pgdata-dev:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"

volumes:
  pgdata-dev:
