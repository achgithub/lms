services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: lms
      POSTGRES_USER: lms
      POSTGRES_PASSWORD: ${DB_PASSWORD:-lmsdev}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lms -d lms"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://lms:${DB_PASSWORD:-lmsdev}@postgres:5432/lms?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      FOOTBALL_API_KEY: ${FOOTBALL_API_KEY:-}
      PORT: "8080"
    ports:
      - "8080:8080"

volumes:
  pgdata:
